services:
  - type: web
    name: lucidframe-api
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
    disk:
      name: uploads
      mountPath: /usr/src/app/uploads
      sizeGB: 1
    autoDeploy: false
